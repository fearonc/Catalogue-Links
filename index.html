<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moved</title>
  <link rel="icon" href="CatLogo.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Background video */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Center container */
    .wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Message box */
    .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 2em;
      border-radius: 12px;
      text-align: center;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 0.5em;
      color: #111;
    }

    a {
      font-size: 1.2em;
      color: #003942;
      text-decoration: none;
      font-weight: bold;
      word-break: break-word;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="https://github.com/fearonc/Catalogue-Links/releases/download/V1.0/GlobeBackground.mp4" type="video/mp4">
  </video>

  <div class="wrapper">
    <div class="box">
      <h1>We have moved to:</h1>
      <p>
        <a href="https://github.thg.dev/Catalogue-And-Supplier-Content/" target="_blank">
          https://your-new-url-here.com
        </a>
      </p>
    </div>
  </div>

</body>
</html>
